<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ phone.name }}</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
        }

        .container {
            width: 60%;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            margin-top: 40px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        img {
            width: 300px;
            display: block;
            margin: 20px auto;
        }

        h1 {
            text-align: center;
        }

        .info {
            font-size: 18px;
            margin-top: 20px;
        }

        .back {
            display: block;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>{{ phone.name }}</h1>

    <img src="{{ phone.image }}" alt="{{ phone.name }}">

    <div class="info">
        <p><strong>Цена:</strong> {{ phone.price }} ₽</p>
        <p><strong>Дата выхода:</strong> {{ phone.release_date }}</p>
        <p><strong>LTE:</strong> {{ phone.lte_exists|yesno:"Да,Нет" }}</p>
    </div>

    <a class="back" href="/stars/catalog/">← Назад в каталог</a>
</div>

</body>
</html>
